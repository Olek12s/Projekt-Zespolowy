<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">

    <style>
        body {
            background-color: aquamarine;
            margin: 0;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            margin: 40px auto;
            width: fit-content;
        }

        .cell {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .white { background-color: lightcyan; }
        .black { background-color: darkslategrey; }

        img {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        .chat-bubble {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 1000;
        }

        .chat-panel {
            display: none;
        }

        .chat-messages {
            height: 200px;
            width: 280px;
            overflow-y: auto;
            border: 1px solid gray;
            background: white;
            padding: 5px;
        }

        .chat-input-row {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }

        .chat-input-row input {
            flex: 1;
        }

    </style>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

</head>

<body>

<div id="board" class="board"></div>

<div class="chat-bubble">
    <button class="chat-toggle-btn" onclick="toggleChat()">Czat ▲</button>
    <div id="chatPanel" class="chat-panel">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
            <input id="chat-input" type="text" />
            <button onclick="sendChat()">Wyślij</button>
        </div>
    </div>
</div>
</div>

<script>
    let stompClient = null;

    let gameId = localStorage.getItem("gameId");
    let token = localStorage.getItem("token");

    let playerId = null;
    let selectedPiece = null;

    let chatOpen = false;

    function connect() {
        const socket = new SockJS(`http://localhost:8089/ws?token=${token}`);   // ????????????????????????????????????????? safe ??????????????????????????????
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            console.log("Connected to WS");

            stompClient.subscribe('/topic/game/' + gameId, function (msg) {
                const state = JSON.parse(msg.body);
                renderBoard(state);
         });

            stompClient.subscribe('/user/queue/state', function (msg) {
                const state = JSON.parse(msg.body);
                console.log("INITIAL STATE:", state);
                renderBoard(state);
            });

            stompClient.subscribe('/topic/game/' + gameId + '/chat', function (msg) {
                const chat = JSON.parse(msg.body);
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.innerHTML = `<b>${chat.sender}:</b> ${chat.content}`;
                const msgs = document.getElementById('chat-messages');
                msgs.appendChild(div);
                msgs.scrollTop = msgs.scrollHeight;
            });

            stompClient.send("/app/state", {}, {});
        });

    }

    function sendMove(from, to) {
        stompClient.send("/app/move", {}, JSON.stringify({
            gameId: gameId,
            move: from + to,
        }));
    }

    function dragstartHandler(ev) {
        selectedPiece = ev.target;
    }

    function dragoverHandler(ev) {
        ev.preventDefault();
    }

    function dropHandler(ev) {
        ev.preventDefault();

        const targetCell = ev.target.closest(".cell");
        if (!targetCell || !selectedPiece) return;

        const from = getSquare(selectedPiece);
        const to = {
            col: targetCell.dataset.col,
            row: targetCell.dataset.row
        };

        sendMove(
            toChess(from.col, from.row),
            toChess(to.col, to.row)
        );

        selectedPiece = null;
    }

    function getSquare(element) {
        const cell = element.closest(".cell");
        return {
            col: cell.dataset.col,
            row: cell.dataset.row
        };
    }

    function toChess(col, row) {
        const file = String.fromCharCode(97 + parseInt(col));
        const rank = 8 - parseInt(row);
        return file + rank;
    }

    function renderBoard(state) {
        const board = state.board;

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {

                const cell = document.getElementById(`cell-${r}-${c}`);
                cell.innerHTML = "";

                const piece = board[r][c];
                if (piece) {
                    const img = document.createElement("img");

                    img.src = getImage(piece);
                    img.draggable = true;
                    img.ondragstart = dragstartHandler;

                    cell.appendChild(img);
                }
            }
        }
    }

    function getImage(piece) {
        switch (piece) {
            case "wP": return "whitePawn.png";
            case "bP": return "blackPawn.png";
            case "wR": return "whiteRook.png";
            case "bR": return "blackRook.png";
            case "wN": return "whiteKnight.png";
            case "bN": return "blackKnight.png";
            case "wB": return "whiteBishop.png";
            case "bB": return "blackBishop.png";
            case "wQ": return "whiteQueen.png";
            case "bQ": return "blackQueen.png";
            case "wK": return "whiteKing.png";
            case "bK": return "blackKing.png";
        }
        return "";
    }

    function createBoard() {
        const board = document.getElementById("board");

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {

                const cell = document.createElement("div");
                cell.classList.add("cell");

                if ((r + c) % 2 === 0) {
                    cell.classList.add("white");
                } else {
                    cell.classList.add("black");
                }

                cell.id = `cell-${r}-${c}`;
                cell.dataset.row = r;
                cell.dataset.col = c;

                cell.ondrop = dropHandler;
                cell.ondragover = dragoverHandler;

                board.appendChild(cell);
            }
        }
    }

    function sendChat() {
        const input = document.getElementById('chat-input');
        const content = input.value.trim();
        if (!content) return;
        stompClient.send("/app/chat", {}, JSON.stringify({
            gameId: gameId,
            content: content
        }));
        input.value = "";
    }

    function toggleChat() {
        const panel = document.getElementById('chatPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendChat();
        });
    });

    window.onload = function () {
        if (!gameId) {
            alert("Brak gameId — wróć do lobby");
            window.location = "mainpage.html";
            return;
        }

        createBoard();
        connect();
    };
</script>

</body>
</html>
