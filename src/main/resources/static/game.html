<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="sheets/game.css">
    <script src="scripts/game.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

</head>

<body>

<div class="chat-bubble">
    <button class="chat-toggle-btn" onclick="toggleChat()">Czat ▲</button>
    <div id="chatPanel" class="chat-panel">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
            <input id="chat-input" type="text" />
            <button onclick="sendChat()">Wyślij</button>
        </div>
    </div>
</div>
<div class="game-layout">
    <div id="board" class="board"></div>
    <div class="sidebar">
        <div class="clock black-clock">
            <span>Black</span>
            <span id="black-timer">10:00</span>
        </div>
        <div class="clock white-clock">
            <span>White</span>
            <span id="white-timer">10:00</span>
        </div>
        <div id="move-list"></div>
    </div>
</div>

</body>
</html>
